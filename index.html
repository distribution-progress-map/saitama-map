<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>配布エリア共有マップ</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<style>

html,body{
height:100%;
margin:0;
}

#map{
height:100%;
}

.panel{
position:absolute;
background:white;
padding:10px;
z-index:1000;
border-radius:8px;
box-shadow:0 0 6px rgba(0,0,0,.3);
}

.title{
top:15px;
left:50%;
transform:translateX(-50%);
font-size:20px;
font-weight:bold;
}


.error-text{
  color:red;
  font-size:14px;
  margin-bottom:8px;
  font-weight:bold;
}


.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:3000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:white;
  width:90%;
  max-width:420px;
  padding:18px;
  border-radius:12px;
  box-shadow:0 0 12px rgba(0,0,0,.35);
  font-size:15px;
}

.modal-box h3{
  margin-top:0;
}

.modal-box label{
  display:block;
  margin-top:10px;
  font-weight:bold;
}

.modal-box label span{
  color:#888;
  font-weight:normal;
  font-size:12px;
}

.modal-box input,
.modal-box select,
.modal-box textarea{
  width:100%;
  box-sizing:border-box;
  padding:8px;
  margin-top:4px;
}

.date-row{
  display:flex;
  gap:6px;
}

.date-row select{
  width:33.3%;
}

.modal-buttons{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.modal-buttons button{
  flex:1;
  padding:10px;
}

.history-item{
  border-bottom:1px solid #bbb;
  padding:8px 0;
  margin-bottom:6px;
}


.id-search-panel{
  top:350px;
  right:15px;
  width:210px;
  padding:6px;
}

.id-search-panel input{
  width:135px;
  padding:5px;
  font-size:12px;
}

.id-search-panel button{
  padding:5px 8px;
  font-size:12px;
}


/* ===== 管理者連絡ボタンここから ===== */
.contact-panel{
  top:45px;
  right:15px;
  width:auto;
  padding:8px 14px;
  display:inline-block;
}

.contact-panel button{
  width:auto;
  padding:6px 10px;
  font-size:13px;
  margin:0 auto;
  display:block;
}
/* ===== 管理者連絡ボタンここまで ===== */



/* ===== ポップアップ管理者ボタンここから ===== */

.popup-admin-btn{
  background:#eeeeee;
  border:1px solid #cccccc;
  color:#444444;
  font-size:12px;
  padding:4px 8px;
  border-radius:4px;
  cursor:pointer;
}

.popup-admin-btn:hover{
  background:#e2e2e2;
}

/* ===== ポップアップ管理者ボタンここまで ===== */



.error-text{
  color:red;
  font-size:13px;
  margin-top:4px;
}



.reset-panel{
bottom:20px;
left:20px;
}



/* ===== スマホ専用レイアウト調整ここから ===== */
@media (max-width:600px){

  .title{
    top:8px;
    left:50%;
    right:auto;
    transform:translateX(-50%);
    font-size:11px;
    padding:6px 10px;

    width:max-content;
    max-width:92vw;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .contact-panel{
    padding:3px 5px;
  }

  .contact-panel button{
    font-size:10px !important;
    padding:3px 6px !important;
  }

  .reset-panel{
    left:6px;
    bottom:6px;
    padding:5px;
  }

  .reset-panel button{
    font-size:11px;
    padding:5px 7px;
  }

  .id-search-panel{
    right:6px;
    bottom:6px;
    top:auto;
    width:170px;
    padding:5px;
  }

  .id-search-panel input{
    width:105px;
    font-size:11px;
    padding:4px;
  }

  .id-search-panel button{
    font-size:11px;
    padding:4px 6px;
  }

  .id-search-count{
    font-size:10px;
    color:#666;
    margin-top:3px;
    text-align:center;
  }

  .admin-history-panel{
    top:auto !important;
    bottom:58px !important;
    right:6px;
    width:170px;
    height:58px !important;
    max-height:none;
    font-size:11px;
    padding:6px;
    transition:height .2s;
  }

  .admin-history-panel.expanded{
    height:160px !important;
  }

  .admin-history-panel #adminHistoryContent{
    height:24px !important;
  }

  .admin-history-panel.expanded #adminHistoryContent{
    height:125px !important;
    overflow-y:auto;
  }

  #adminHistoryContent{
    height:25px;
  }

  .history-title{
    margin-bottom:2px;
  }

  .scroll-hint{
    height:14px;
    line-height:14px;
    font-size:10px;
  }

  .leaflet-popup-content{
    width:64vw !important;
    max-width:64vw !important;
    font-size:12px;
    line-height:1.4;
  }

  .leaflet-popup-content button{
    font-size:12px !important;
    padding:4px 7px !important;
  } 

  .popup-main-info{
    font-size:110%;
    line-height:1.45;
  }


  /* ===== iPhone入力欄ズーム防止ここから ===== */
  input,
  select,
  textarea,
  button{
    font-size:16px !important;
  }
  /* ===== iPhone入力欄ズーム防止ここまで ===== */



  /* ===== スマホ用：入力フォームを画面内スクロールここから ===== */
  .modal-bg{
    align-items:flex-start;
    overflow-y:auto;
    padding:20px 0 90px;
  }

  .modal-box{
    max-height:calc(100vh - 120px);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
/* ===== スマホ用：入力フォームを画面内スクロールここまで ===== */


/* ===== スマホ専用：入力フォーム横幅80%ここから ===== */
  .modal-box{
    width:80% !important;
    max-width:80% !important;
  }
/* ===== スマホ専用：入力フォーム横幅80%ここまで ===== */


}
/* ===== スマホ専用レイアウト調整ここまで ===== */




/* ===== 描画中ボタン日本語表示ここから ===== */

/* Finish を隠して日本語を表示 */
.leaflet-draw-actions a[title="Finish drawing"] {
  font-size: 0;
}

.leaflet-draw-actions a[title="Finish drawing"]::after {
  content: "囲み終わり";
  font-size: 13px;
}

/* Cancel を隠して日本語を表示 */
.leaflet-draw-actions a[title="Cancel drawing"] {
  font-size: 0;
}

.leaflet-draw-actions a[title="Cancel drawing"]::after {
  content: "キャンセル";
  font-size: 13px;
}

/* Delete last point は環境によって title が違うことがあるので両対応 */
.leaflet-draw-actions a[title="Delete last point"] {
  font-size: 0;
}

.leaflet-draw-actions a[title="Delete last point"]::after {
  content: "1つ戻る";
  font-size: 13px;
}

/* ===== 描画中ボタン日本語表示ここまで ===== */



/* ===== 修正依頼フォームの日付欄調整ここから ===== */
#requestFormModal .date-row {
  display: block;
}

#requestFormModal .date-row select {
  width: 100%;
  margin-bottom: 6px;
}
/* ===== 修正依頼フォームの日付欄調整ここまで ===== */



/* ===== 管理者修正履歴パネルここから ===== */

.admin-history-panel{
  top:100px;
  right:15px;
  width:210px;
  height:220px;
  overflow:hidden;
  font-size:13px;
  line-height:1.5;
}

.history-title{
  margin-bottom:4px;
}

#adminHistoryContent{
  height:180px;
  overflow-y:auto;
}

.scroll-hint{
  height:18px;
  line-height:18px;
  text-align:center;
  font-size:11px;
  color:#888;
  border-top:1px solid #eee;
}

/* ===== 管理者修正履歴パネルここまで ===== */


</style>
</head>

<body>

<div id="map"></div>

<div id="areaFormModal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <h3>配布エリア登録</h3>

    <div id="typeError" class="error-text"></div>

    <label>※種類</label>
<select id="formType">
  <option value="">選択する</option>
  <option value="配布予定">配布予定</option>
  <option value="配布済">配布済</option>
</select>




<label>配布予定日または配布実施日</label>
<div class="date-row">
  <select id="formYear">
    <option value="">年（未入力も可）</option>
    <option value="2026">2026</option>
    <option value="2027">2027</option>
  </select>

  <select id="formMonth">
    <option value="">月（未入力も可）</option>
  </select>

  <select id="formDay">
    <option value="">日（未入力も可）</option>
  </select>
</div>

<label>枚数</label>
<input id="formCount" type="text" placeholder="未入力も可">

<label>担当者</label>
<input id="formPerson" type="text" placeholder="匿名可・未入力も可">

<label>備考</label>
<textarea id="formNote" placeholder="未入力も可"></textarea>

<label>※合言葉</label>
<input id="formPass" type="password" placeholder="合言葉">



    <div class="modal-buttons">
      <button onclick="submitAreaForm()">OK</button>
      <button onclick="cancelAreaForm()">キャンセル</button>
    </div>
  </div>
</div>


<div id="doneFormModal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <h3>配布済にする</h3>

    <div id="doneError" class="error-text"></div>

    <label>種類</label>
    <input type="text" value="配布済" disabled>

    <label>配布予定日または配布実施日</label>
    <div class="date-row">
      <select id="doneYear">
        <option value="">年（未入力も可）</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
      </select>

      <select id="doneMonth">
        <option value="">月（未入力も可）</option>
      </select>

      <select id="doneDay">
        <option value="">日（未入力も可）</option>
      </select>
    </div>

    <label>枚数</label>
    <input id="doneCount" type="text" placeholder="未入力も可">

    <label>担当者</label>
    <input id="donePerson" type="text" placeholder="匿名可・未入力も可">

    <label>備考</label>
    <textarea id="doneNote" placeholder="未入力も可"></textarea>

    <label>※合言葉</label>
    <input id="donePass" type="password" placeholder="合言葉">

    <div class="modal-buttons">
      <button onclick="submitDoneForm()">配布済にする</button>
      <button onclick="cancelDoneForm()">キャンセル</button>
    </div>
  </div>
</div>


<div id="requestFormModal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <h3>修正依頼</h3>

    <div id="requestError" class="error-text"></div>

    <label>修正したい項目だけ入力</label>

    <label>種類</label>
    <select id="requestType">
      <option value="">未入力も可</option>
      <option value="配布予定">配布予定</option>
      <option value="配布済">配布済</option>
    </select>

    <label>配布予定日または配布実施日</label>
    <div class="date-row">
  　　<select id="requestYear">
    　　<option value="">年（未入力も可）</option>
    　　<option value="2026">2026</option>
    　　<option value="2027">2027</option>
  　　</select>

  　　<select id="requestMonth">
    　　<option value="">月（未入力も可）</option>
  　　</select>

  <select id="requestDay">
    <option value="">日（未入力も可）</option>
  </select>
</div>

    <label>枚数</label>
    <input id="requestCount" type="text" placeholder="未入力も可">

    <label>担当者</label>
    <input id="requestPerson" type="text" placeholder="未入力も可">

    <label>備考</label>
    <textarea id="requestNote" placeholder="未入力も可"></textarea>

    <label>※合言葉</label>
    <input id="requestPass" type="password" placeholder="合言葉">

    <div class="modal-buttons">
      <button onclick="submitModifyRequest()">修正依頼</button>
      <button onclick="cancelRequestForm()">キャンセル</button>
    </div>
  </div>
</div>


<div id="requestChoiceModal" class="modal-bg" style="display:none;">
  <div class="modal-box">

    <h3>管理者へ依頼</h3>

    <p>どちらの依頼を送信しますか？</p>

    <div class="modal-buttons">
      <button onclick="chooseDeleteRequest()">削除依頼</button>
      <button onclick="chooseModifyRequest()">修正依頼</button>
      <button onclick="cancelRequestChoice()">キャンセル</button>
    </div>

  </div>
</div>



<div class="panel title" id="titleBox">
読み込み中...
</div>


<!-- ===== 管理者連絡ボタンここから ===== -->
<div class="panel contact-panel">
  <button onclick="openContactForm()">
    管理者へ連絡
  </button>
</div>
<!-- ===== 管理者連絡ボタンここまで ===== -->




<div id="contactFormModal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <h3>管理者へ連絡</h3>

    <div id="contactError" class="error-text"></div>

    <p style="font-size:13px;color:#666;">
      連絡先が空欄の場合は「管理者修正履歴」より返信させていただきます。
    </p>

    <label>※タイトル</label>
    <input id="contactTitle" type="text">

    <label>※内容</label>
    <textarea id="contactMessage"></textarea>

    <label>名前</label>
    <input id="contactName" type="text" placeholder="未入力も可">

    <label>メールアドレス</label>
    <input id="contactEmail" type="email" placeholder="未入力も可">

    <label>備考</label>
    <textarea id="contactNote" placeholder="未入力も可"></textarea>

    <label>※合言葉</label>
    <input id="contactPass" type="password" placeholder="合言葉">

    <div class="modal-buttons">
      <button onclick="submitContactForm()">送信</button>
      <button onclick="cancelContactForm()">キャンセル</button>
    </div>
  </div>
</div>

<div class="panel admin-history-panel" id="adminHistoryBox">

  <div class="history-title">
    <strong>管理者修正履歴</strong>
  </div>

  <div id="adminHistoryContent">
    読み込み中...
  </div>

  <div class="scroll-hint">
    ▼スクロールできます
  </div>

</div>


<div class="panel id-search-panel">
  <input id="idSearchInput" type="text" placeholder="ID検索">
  <button onclick="searchAreaById()">検索</button>
  <div id="idSearchResultCount" class="id-search-count"></div>
</div>


<div class="panel reset-panel">
<button onclick="resetView()">全体表示に戻る</button>
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbysYcR6z1nZ3iaDa8hVvwO50-REyUzzbHf5U2hgdhEoBpTtdK4W99OL_iZzI6WmntYeBg/exec";

const map=L.map("map").setView([35.9,139.5],9);

L.tileLayer(
"https://tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"©OpenStreetMap"}
).addTo(map);



const drawnItems=new L.FeatureGroup();
map.addLayer(drawnItems);

const plannedItemsById = {};
const areaItemsById = {};
const areaLayersById = {};
let currentRequestId = null;


// ===== 描画ツール日本語化ここから =====

L.drawLocal.draw.toolbar.buttons.polygon = "配布エリアを描く";

L.drawLocal.draw.handlers.polygon.tooltip.start =
"地図をクリックして配布エリアの1点目を決めてください";

L.drawLocal.draw.handlers.polygon.tooltip.cont =
"続けてクリックして範囲を囲んでください。最初の点をクリックすると範囲が確定します";

L.drawLocal.draw.handlers.polygon.tooltip.end =
"最初の点をクリックすると範囲が確定します";

/* ←ここが重要追加 */

L.drawLocal.draw.handlers.polygon.finish = {
  title: "この範囲で登録します",
  text: "この範囲で登録"
};

L.drawLocal.draw.toolbar.undo = {
  title: "直前の点を削除",
  text: "1つ戻る"
};

L.drawLocal.draw.toolbar.cancel = {
  title: "描画を中止します",
  text: "キャンセル"
};

// ===== 描画ツール日本語化ここまで =====






const drawControl=new L.Control.Draw({

draw:{
  polygon:true,
  rectangle:false,
  circle:false,
  marker:false,
  polyline:false,
  circlemarker:false
},

edit:{
featureGroup:drawnItems,
edit:false,
remove:false
}

});


map.addControl(drawControl);



fetch("saitama.geojson")

.then(res=>res.json())

.then(data=>{

const boundary=L.geoJSON(data,{

style:{
color:"#000",
weight:2,
fill:true,
fillColor:"#dddddd",
fillOpacity:0.5
},

onEachFeature:function(feature,layer){

layer.on("click",function(){

map.fitBounds(layer.getBounds(), getCityFitOptions());
});

}

}).addTo(map);



map.fitBounds(boundary.getBounds());

window.fullBounds=boundary.getBounds();

});



function getColor(type){

if(type==="配布済") return "#ff3333";

if(type==="配布予定") return "#0066ff";

return "#999";

}


function formatDateSimple(value){

  if(!value) return "";

  const d = new Date(value);

  if(isNaN(d)) return value;

  return d.getFullYear() + "/" +
         (d.getMonth()+1) + "/" +
         d.getDate();

}


function openPopupAbove(layer) {
  const bounds = layer.getBounds();
  const topCenter = L.latLng(
    bounds.getNorth(),
    (bounds.getEast() + bounds.getWest()) / 2
  );

  layer.openPopup(topCenter);
}


function makePopupHtml(row, isPlanned){

  let html =
     `<div class="popup-main-info">` +
    "種類：" + row["種類"] + "<br>" +
    "実施日：" + formatDateSimple(row["実施日"]) + "<br>" +
    "枚数：" + row["枚数"] + "<br>" +
    "担当：" + row["担当者"] + "<br>" +
    "備考：" + row["備考"] +
    `</div>`;

  if(isPlanned){
    html += `<br><br>
      <button onclick="convertPlannedToDone('${row["ID"]}')">
        配布済にする
      </button>`;
  }

  html += `<br><br>
    <button class="popup-admin-btn"
      onclick="openRequestMenu('${row["ID"]}')">
      管理者へ修正依頼
    </button>`;

  html += `
    <hr style="margin:10px 0; border:none; border-top:1px dashed #ccc;">
    <div style="font-size:12px; color:#666;">
      管理者用ID：${row["ID"]}<br>
      <button class="popup-admin-btn"
        onclick="copyAreaId('${row["ID"]}')"
        style="margin-top:4px; font-size:11px;">
        IDをコピー
      </button>
    </div>
  `;

  return html;
}

function copyAreaId(id){

  navigator.clipboard.writeText(id)
    .then(function(){
      alert("IDをコピーしました");
    })
    .catch(function(){
      prompt("このIDをコピーしてください", id);
    });

}

window.copyAreaId = copyAreaId;


function renderAdminHistory(areas){

  const histories = areas.filter(row =>
    row["管理者修正履歴"]
  );

  const box = document.getElementById("adminHistoryContent");

  if(histories.length === 0){
    box.innerHTML = "履歴なし";
    return;
  }

  box.innerHTML =
    histories.reverse().map(row => `
      <div class="history-item">

        修正依頼日：
        ${formatDateSimple(row["修正依頼日時"]) || ""}<br>

        管理者修正日時：
        ${formatDateSimple(row["管理者修正日時"]) || ""}<br>

        内容：<br>
        ${String(row["管理者修正履歴"])
          .replace(/\n/g,"<br>")}

      </div>
    `).join("");

}


fetch(SCRIPT_URL)

.then(res=>res.json())

.then(json=>{

document.getElementById("titleBox")
.textContent=json.title;

renderAdminHistory(json.areas);

const planned=[];
const done=[];



json.areas.forEach(row=>{

if(!row["図形データ"])return;

const geo=JSON.parse(row["図形データ"]);

if(row["種類"]==="配布予定") planned.push({geo,row});

if(row["種類"]==="配布済") done.push({geo,row});

});





function drawLayer(item){

const layer=L.geoJSON(item.geo,{

style:{
  color:getColor(item.row["種類"]),
  fillColor:getColor(item.row["種類"]),
  fillOpacity:item.row["種類"]==="配布済" ? 0.5 : 0.35
}

}).addTo(drawnItems);



const isPlanned = item.row["種類"] === "配布予定";

areaItemsById[item.row["ID"]] = item;

areaLayersById[item.row["ID"]] = layer;

if(isPlanned){
  plannedItemsById[item.row["ID"]] = item;
}

layer.bindPopup(
  makePopupHtml(item.row, isPlanned)
);

let doneFormResolver = null;

function splitDateValue(value){
  if(!value) return {year:"", month:"", day:""};

  const d = new Date(value);

  if(!isNaN(d)){
    return {
      year:String(d.getFullYear()),
      month:String(d.getMonth()+1),
      day:String(d.getDate())
    };
  }

  const parts = String(value).split("/");
  return {
    year:parts[0] || "",
    month:parts[1] || "",
    day:parts[2] || ""
  };
}

function openDoneForm(row){
  const dateParts = splitDateValue(row["実施日"]);

  document.getElementById("doneYear").value = dateParts.year;
  document.getElementById("doneMonth").value = dateParts.month;
  document.getElementById("doneDay").value = dateParts.day;

  document.getElementById("doneCount").value = row["枚数"] || "";
  document.getElementById("donePerson").value = row["担当者"] || "";
  document.getElementById("doneNote").value = row["備考"] || "";
  document.getElementById("donePass").value = "";
  document.getElementById("doneError").textContent = "";

  document.getElementById("doneFormModal").style.display = "flex";

// ===== スマホ：二本指中はクリックを無効化（確実版）ここから =====

let ignoreNextClick = false;

// 二本指検出
map.getContainer().addEventListener("touchstart", function(e){

  if(e.touches.length >= 2){
    ignoreNextClick = true;
  }

}, {passive:true});


// 指が全部離れたら少し後に解除
map.getContainer().addEventListener("touchend", function(){

  setTimeout(function(){
    ignoreNextClick = false;
  }, 300);

}, {passive:true});


// clickイベントそのものを止める
map.on("click", function(e){

  if(ignoreNextClick){

    e.originalEvent.stopPropagation();

    return;

  }

});
