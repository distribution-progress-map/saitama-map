<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>配布エリア共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<style>
html,body{
  height:100%;
  margin:0;
}

#map{
  height:100%;
}

.panel{
  position:absolute;
  background:white;
  padding:10px;
  z-index:1000;
  border-radius:8px;
  box-shadow:0 0 6px rgba(0,0,0,.3);
}

.title{
  top:15px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
  font-weight:bold;
}

.error-text{
  color:red;
  font-size:13px;
  margin-top:4px;
  margin-bottom:8px;
  font-weight:bold;
}

.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:3000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:white;
  width:90%;
  max-width:420px;
  padding:18px;
  border-radius:12px;
  box-shadow:0 0 12px rgba(0,0,0,.35);
  font-size:15px;
}

.modal-box h3{
  margin-top:0;
}

.modal-box label{
  display:block;
  margin-top:10px;
  font-weight:bold;
}

.modal-box label span{
  color:#888;
  font-weight:normal;
  font-size:12px;
}

.modal-box input,
.modal-box select,
.modal-box textarea{
  width:100%;
  box-sizing:border-box;
  padding:8px;
  margin-top:4px;
}

.date-row{
  display:flex;
  gap:6px;
}

.date-row select{
  width:33.3%;
}

.modal-buttons{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.modal-buttons button{
  flex:1;
  padding:10px;
}

.history-item{
  border-bottom:1px solid #bbb;
  padding:8px 0;
  margin-bottom:6px;
}

.id-search-panel{
  top:350px;
  right:15px;
  width:210px;
  padding:6px;
}

.id-search-panel input{
  width:135px;
  padding:5px;
  font-size:12px;
}

.id-search-panel button{
  padding:5px 8px;
  font-size:12px;
}

.contact-panel{
  top:45px;
  right:15px;
  width:auto;
  padding:8px 14px;
  display:inline-block;
}

.contact-panel button{
  width:auto;
  padding:6px 10px;
  font-size:13px;
  margin:0 auto;
  display:block;
}

.popup-admin-btn{
  background:#eff6ff;
  border:1px solid #93c5fd;
  color:#1d4ed8;
  font-size:12px;
  font-weight:700;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:none;
  transition:background .15s ease, border-color .15s ease, color .15s ease, transform .15s ease;
}

.leaflet-popup-content{
  font-size:13px;
  line-height:1.6;
}

.popup-main-info{
  font-size:14px;
  line-height:1.7;
  color:#222;
}

.popup-main-info strong{
  color:#111;
}

.popup-sub-divider{
  margin:12px 0 10px;
  border:none;
  border-top:1px dashed #cbd5e1;
}

.popup-admin-box{
  margin-top:2px;
  padding:10px 12px;
  background:#f8fbff;
  border:1px solid #dbeafe;
  border-radius:10px;
}

.popup-admin-label{
  display:block;
  margin-bottom:4px;
  font-size:11px;
  font-weight:700;
  color:#64748b;
  letter-spacing:0.03em;
}

.popup-admin-id{
  display:block;
  margin-bottom:8px;
  font-size:12px;
  color:#334155;
  line-height:1.5;
  word-break:break-all;
}

.popup-admin-btn{
  background:#eff6ff;
  border:1px solid #93c5fd;
  color:#1d4ed8;
  font-size:12px;
  font-weight:700;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:none;
  transition:background .15s ease, border-color .15s ease, color .15s ease, transform .15s ease;
}

.popup-admin-btn:hover{
  background:#dbeafe;
  border-color:#60a5fa;
  color:#1e40af;
  transform:translateY(-1px);
}

.popup-admin-btn:active{
  transform:translateY(0);
}

.popup-admin-btn:hover{
  background:#dbeafe;
  border-color:#60a5fa;
  color:#1e40af;
  transform:translateY(-1px);
}

.popup-admin-btn:active{
  transform:translateY(0);
}

.reset-panel{
  bottom:20px;
  left:20px;
}

.history-toggle-hint{
  font-size:11px;
  color:#888;
  margin-left:6px;
}

.admin-history-panel{
  top:100px;
  right:15px;
  width:210px;
  height:220px;
  overflow:hidden;
  font-size:13px;
  line-height:1.5;
}

.history-title{
  margin-bottom:4px;
}

#adminHistoryContent{
  height:180px;
  overflow-y:auto;
}

.scroll-hint{
  height:18px;
  line-height:18px;
  text-align:center;
  font-size:11px;
  color:#888;
  border-top:1px solid #eee;
}

.leaflet-top.leaflet-left{
  top:72px;
  bottom:auto;
  left:18px;
}

.mobile-draw-panel,
.map-center-cross,
.mobile-draw-start{
  display:none;
}

.leaflet-draw-draw-polygon{
  width:auto !important;
  height:auto !important;
  background:none !important;
  border:none !important;
  box-shadow:none !important;
}

.leaflet-draw-draw-polygon span{
  display:none;
}

.leaflet-draw-draw-polygon::after{
  content:"エリアを作図";
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:132px;
  height:44px;
  padding:0 18px;
  background:linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
  color:#fff;
  font-size:15px;
  font-weight:700;
  letter-spacing:0.03em;
  border-radius:999px;
  border:none;
  box-shadow:0 10px 24px rgba(37,99,235,0.32);
}

.leaflet-draw-draw-polygon:hover::after{
  background:linear-gradient(180deg, #4f8df7 0%, #2f6df0 100%);
  box-shadow:0 14px 28px rgba(37,99,235,0.38);
  transform:translateY(-1px);
}

.leaflet-draw-draw-polygon:active::after{
  transform:translateY(0);
  box-shadow:0 8px 18px rgba(37,99,235,0.28);
}

.leaflet-draw-toolbar a{
  width:auto !important;
  height:auto !important;
  background-image:none !important;
  text-indent:0 !important;
}

.leaflet-bar{
  box-shadow:none;
  border:none;
  background:transparent;
}

.leaflet-bar a{
  border:none;
  background:transparent;
}


/* 描画中ボタン日本語表示 */
.leaflet-draw-actions a[title="Finish drawing"] {
  font-size: 0;
}
.leaflet-draw-actions a[title="Finish drawing"]::after {
  content: "囲み終わり";
  font-size: 13px;
}

.leaflet-draw-actions a[title="Cancel drawing"] {
  font-size: 0;
}
.leaflet-draw-actions a[title="Cancel drawing"]::after {
  content: "キャンセル";
  font-size: 13px;
}

.leaflet-draw-actions a[title="Delete last point"] {
  font-size: 0;
}
.leaflet-draw-actions a[title="Delete last point"]::after {
  content: "1つ戻る";
  font-size: 13px;
}

#requestFormModal .date-row{
  display:block;
}

#requestFormModal .date-row select{
  width:100%;
  margin-bottom:6px;
}

.leaflet-control-zoom{
  border:none !important;
  box-shadow:0 0 6px rgba(0,0,0,.18) !important;
}

.leaflet-control-zoom a{
  width:34px;
  height:34px;
  line-height:34px;
  background:#ffffff !important;
  color:#333333 !important;
  border:1px solid #d8d8d8 !important;
  box-shadow:none !important;
  font-weight:bold;
  font-size:20px;
}

.leaflet-control-zoom a:first-child{
  border-top-left-radius:8px;
  border-top-right-radius:8px;
}

.leaflet-control-zoom a:last-child{
  border-bottom-left-radius:8px;
  border-bottom-right-radius:8px;
  border-top:none !important;
}

.leaflet-control-zoom a:hover{
  background:#f5f5f5 !important;
  color:#111111 !important;
}



/* スマホ */
@media (max-width:600px) and (pointer:coarse){
  .title{
    top:8px;
    left:50%;
    right:auto;
    transform:translateX(-50%);
    font-size:11px;
    padding:6px 10px;
    width:max-content;
    max-width:92vw;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .contact-panel{
    padding:3px 5px;
  }

  .contact-panel button{
    font-size:10px !important;
    padding:3px 6px !important;
  }

  .reset-panel{
    left:6px;
    bottom:6px;
    padding:5px;
  }

  .reset-panel button{
    font-size:11px;
    padding:5px 7px;
  }

  .id-search-panel{
    right:6px;
    bottom:6px;
    top:auto;
    width:170px;
    padding:5px;
  }

  .id-search-panel input{
    width:105px;
    font-size:11px;
    padding:4px;
  }

  .id-search-panel button{
    font-size:11px;
    padding:4px 6px;
  }

  .id-search-count{
    font-size:10px;
    color:#666;
    margin-top:3px;
    text-align:center;
  }

  .admin-history-panel{
    top:auto !important;
    bottom:58px !important;
    right:6px;
    width:170px;
    height:58px !important;
    max-height:none;
    font-size:11px;
    padding:6px;
    transition:height .2s;
  }

  .admin-history-panel.expanded{
    height:160px !important;
  }

  .admin-history-panel #adminHistoryContent{
    height:24px !important;
  }

  .admin-history-panel.expanded #adminHistoryContent{
    height:125px !important;
    overflow-y:auto;
  }

  #adminHistoryContent{
    height:25px;
  }

  .history-title{
    margin-bottom:2px;
  }

  .scroll-hint{
    height:14px;
    line-height:14px;
    font-size:10px;
  }

  .leaflet-popup-content{
    width:64vw !important;
    max-width:64vw !important;
    font-size:12px;
    line-height:1.5;
  }

  .leaflet-popup-content button{
    font-size:12px !important;
    padding:6px 10px !important;
    border-radius:8px;
  }

  .popup-main-info{
    font-size:13px;
    line-height:1.6;
  }

  .popup-admin-box{
    padding:9px 10px;
  }

  .popup-admin-label{
    font-size:10px;
  }

  .popup-admin-id{
    font-size:11px;
  }

  input,
  select,
  textarea,
  button{
    font-size:16px !important;
  }

  .modal-bg{
    align-items:flex-start;
    overflow-y:auto;
    padding:20px 0 90px;
  }

  .modal-box{
    max-height:calc(100vh - 120px);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    width:80% !important;
    max-width:80% !important;
  }

  .mobile-draw-start{
    display:block;
    position:absolute;
    left:12px;
    top:64px;
    z-index:2000;
    background:transparent;
    padding:0;
    border-radius:0;
    box-shadow:none;
  }

  .mobile-draw-panel{
    display:none;
    position:absolute;
    left:6px;
    top:60px;
    z-index:2000;
    flex-direction:column;
    gap:4px;
    background:white;
    padding:6px;
    border-radius:8px;
    box-shadow:0 0 6px rgba(0,0,0,.3);
  }

  .mobile-draw-start button{
    min-width:138px;
    height:46px;
    padding:0 18px;
    border:none;
    border-radius:999px;
    background:linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
    color:#fff;
    font-size:15px !important;
    font-weight:700;
    letter-spacing:0.03em;
    box-shadow:0 10px 22px rgba(37,99,235,0.30);
  }

  .mobile-draw-panel button{
    font-size:12px !important;
    padding:5px 7px;
  }

  .map-center-cross{
    display:none;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:1500;
    font-size:28px;
    font-weight:bold;
    color:#ff3333;
    pointer-events:none;
    text-shadow:0 0 3px white;
  }

  .leaflet-draw{
    display:none !important;
  }

  .leaflet-top.leaflet-left{
    top:8px;
    bottom:auto;
    left:8px;
  }

  .history-toggle-hint{
    font-size:10px;
  }
}


/* ===== 見た目の微調整ここから ===== */

body{
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#222;
}

.panel{
  background:rgba(255,255,255,0.96);
  border:1px solid rgba(0,0,0,0.08);
  border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,0.12);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}

.title{
  background:rgba(255,255,255,0.96);
  padding:10px 16px;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:999px;
  box-shadow:0 6px 18px rgba(0,0,0,0.10);
  letter-spacing:0.02em;
}

.modal-bg{
  background:rgba(0,0,0,0.52);
}

.modal-box{
  background:#ffffff;
  border-radius:16px;
  box-shadow:0 18px 48px rgba(0,0,0,0.22);
  padding:20px;
}

.modal-box h3{
  margin:0 0 14px 0;
  font-size:20px;
  line-height:1.4;
  color:#222;
}

label{
  display:block;
  margin-top:12px;
  margin-bottom:6px;
  font-size:14px;
  font-weight:700;
  color:#333;
}

input,
select,
textarea{
  width:100%;
  padding:10px 12px;
  border:1px solid #cfcfcf;
  border-radius:10px;
  background:#fff;
  font-size:14px;
  line-height:1.5;
  box-sizing:border-box;
}

input:focus,
select:focus,
textarea:focus{
  outline:none;
  border-color:#2f7df6;
  box-shadow:0 0 0 3px rgba(47,125,246,0.15);
}

textarea{
  min-height:88px;
  resize:vertical;
}

button{
  border:none;
  border-radius:10px;
  padding:10px 14px;
  font-size:14px;
  font-weight:700;
  line-height:1.4;
  background:#2f7df6;
  color:#fff;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(47,125,246,0.22);
  transition:transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(47,125,246,0.24);
}

button:active{
  transform:translateY(0);
  opacity:0.92;
}

.modal-buttons{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.modal-buttons button{
  flex:1;
}

.modal-buttons button:last-child{
  background:#e9edf3;
  color:#333;
  box-shadow:none;
}

.error-text{
  color:#d93025;
  font-size:13px;
  margin-top:4px;
  margin-bottom:8px;
  font-weight:700;
}

.id-search-panel{
  display:flex;
  align-items:center;
  gap:8px;
}

.id-search-panel input{
  min-width:120px;
}

.id-search-count{
  font-size:12px;
  color:#555;
  margin-top:4px;
}

#adminHistoryBox{
  background:rgba(255,255,255,0.96);
  border:1px solid rgba(0,0,0,0.08);
  border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,0.12);
  overflow:hidden;
}

.history-title{
  background:#f7f9fc;
  padding:12px 14px;
  border-bottom:1px solid rgba(0,0,0,0.06);
}

#adminHistoryContent{
  padding:12px 14px;
  font-size:13px;
  line-height:1.7;
}

.scroll-hint{
  padding:8px 14px 12px;
  font-size:12px;
  color:#666;
}

.mobile-draw-start button,
.mobile-draw-panel button{
  width:100%;
}

@media (max-width:600px){
  .panel{
    padding:12px;
    border-radius:14px;
  }

  .title{
    max-width:calc(100% - 24px);
    font-size:18px;
    text-align:center;
  }

  .modal-box{
    width:92%;
    max-width:none;
    padding:18px;
    border-radius:16px;
  }

  input,
  select,
  textarea,
  button{
    font-size:16px;
  }

  .modal-buttons{
    flex-direction:column;
  }

  .id-search-panel{
    display:block;
  }

  .id-search-panel input,
  .id-search-panel button{
    width:100%;
    margin-top:8px;
  }
}

/* ===== 見た目の微調整ここまで ===== */


</style>
</head>

<body>

<div id="map"></div>

<div class="mobile-draw-start" id="mobileDrawStart">
  <button onclick="startMobileDraw()">作図開始</button>
</div>

<div class="mobile-draw-panel" id="mobileDrawPanel">
  <button onclick="startMobileDraw()">作図開始</button>
  <button onclick="addMobilePoint()">ここに点を追加</button>
  <button onclick="undoMobilePoint()">1つ戻る</button>
  <button onclick="finishMobileDraw()">囲み終わり</button>
  <button onclick="cancelMobileDraw()">キャンセル</button>
</div>

<div class="map-center-cross" id="mapCenterCross">＋</div>

<div id="areaFormModal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <h3>配布エリア登録</h3>
    <div id="typeError" class="error-text"></div>

    <label>※種類</label>
    <select id="formType">
      <option value="">選択する</option>
      <option value="配布予定">配布予定</option>
      <option value="配布済">配布済</option>
    </select>

    <label>配布予定日または配布実施日</label>
    <div class="date-row">
      <select id="formYear">
        <option value="">年（未入力も可）</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
      </select>
      <select id="formMonth">
        <option value="">月（未入力も可）</option>
      </select>
      <select id="formDay">
        <option value="">日（未入力も可）</option>
      </select>
    </div>

    <label>枚数</label>
    <input id="formCount" type="text" placeholder="未入力も可">

    <label>担当者</label>
    <input id="formPerson" type="text" placeholder="匿名可・未入力も可">

    <label>備考</label>
    <textarea id="formNote" placeholder="未入力も可"></textarea>

    <label>※合言葉</label>
    <input id="formPass" type="password" placeholder="合言葉">

    <div class="modal-buttons">
      <button onclick="submitAreaForm()">OK</button>
      <button onclick="cancelAreaForm()">キャンセル</button>
    </div>
  </div>
</div>

<div id="doneFormModal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <h3>配布済にする</h3>
    <div id="doneError" class="error-text"></div>

    <label>種類</label>
    <input type="text" value="配布済" disabled>

    <label>配布予定日または配布実施日</label>
    <div class="date-row">
      <select id="doneYear">
        <option value="">年（未入力も可）</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
      </select>
      <select id="doneMonth">
        <option value="">月（未入力も可）</option>
      </select>
      <select id="doneDay">
        <option value="">日（未入力も可）</option>
      </select>
    </div>

    <label>枚数</label>
    <input id="doneCount" type="text" placeholder="未入力も可">

    <label>担当者</label>
    <input id="donePerson" type="text" placeholder="匿名可・未入力も可">

    <label>備考</label>
    <textarea id="doneNote" placeholder="未入力も可"></textarea>

    <label>※合言葉</label>
    <input id="donePass" type="password" placeholder="合言葉">

    <div class="modal-buttons">
      <button onclick="submitDoneForm()">配布済にする</button>
      <button onclick="cancelDoneForm()">キャンセル</button>
    </div>
  </div>
</div>

<div id="requestFormModal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <h3>修正依頼</h3>
    <div id="requestError" class="error-text"></div>

    <label>修正したい項目だけ入力</label>

    <label>種類</label>
    <select id="requestType">
      <option value="">未入力も可</option>
      <option value="配布予定">配布予定</option>
      <option value="配布済">配布済</option>
    </select>

    <label>配布予定日または配布実施日</label>
    <div class="date-row">
      <select id="requestYear">
        <option value="">年（未入力も可）</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>

      <span class="history-toggle-hint">（タップで開閉）</span>
    </strong>

  <div id="adminHistoryContent">読み込み中...</div>

  <div class="scroll-hint">▼スクロールできます</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysYcR6z1nZ3iaDa8hVvwO50-REyUzzbHf5U2hgdhEoBpTtdK4W99OL_iZzI6WmntYeBg/exec";

const map = L.map("map").setView([35.9, 139.5], 9);

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "©OpenStreetMap"
}).addTo(map);

const isTouchDevice = window.matchMedia("(max-width:600px) and (pointer:coarse)").matches;

if(isTouchDevice){
  document.getElementById("mobileDrawStart").style.display = "block";
  document.getElementById("mobileDrawPanel").style.display = "none";
  document.getElementById("mapCenterCross").style.display = "none";

  const drawToolbar = document.querySelector(".leaflet-draw");
  if(drawToolbar) drawToolbar.style.display = "none";
}else{
  document.getElementById("mobileDrawPanel").style.display = "none";
  document.getElementById("mapCenterCross").style.display = "none";
}

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const plannedItemsById = {};
const areaItemsById = {};
const areaLayersById = {};
let currentRequestId = null;

L.drawLocal.draw.toolbar.buttons.polygon = "配布エリアを描く";
L.drawLocal.draw.handlers.polygon.tooltip.start = "地図をクリックして配布エリアの1点目を決めてください";
L.drawLocal.draw.handlers.polygon.tooltip.cont = "続けてクリックして範囲を囲んでください。最初の点をクリックすると範囲が確定します";
L.drawLocal.draw.handlers.polygon.tooltip.end = "最初の点をクリックすると範囲が確定します";
L.drawLocal.draw.handlers.polygon.finish = {
  title: "この範囲で登録します",
  text: "この範囲で登録"
};
L.drawLocal.draw.toolbar.undo = {
  title: "直前の点を削除",
  text: "1つ戻る"
};
L.drawLocal.draw.toolbar.cancel = {
  title: "描画を中止します",
  text: "キャンセル"
};

const drawControl = new L.Control.Draw({
  draw:{
    polygon:true,
    rectangle:false,
    circle:false,
    marker:false,
    polyline:false,
    circlemarker:false
  },
  edit:{
    featureGroup:drawnItems,
    edit:false,
    remove:false
  }
});
map.addControl(drawControl);

fetch("saitama.geojson")
  .then(res => res.json())
  .then(data => {
    const boundary = L.geoJSON(data, {
      style:{
        color:"#000",
        weight:2,
        fill:true,
        fillColor:"#dddddd",
        fillOpacity:0.5
      },
      onEachFeature:function(feature, layer){
        layer.on("click", function(){
          map.fitBounds(layer.getBounds(), getCityFitOptions());
        });
      }
    }).addTo(map);

    map.fitBounds(boundary.getBounds());
    window.fullBounds = boundary.getBounds();
  });

function getColor(type){
  if(type === "配布済") return "#ff3333";
  if(type === "配布予定") return "#0066ff";
  return "#999";
}

function formatDateSimple(value){
  if(!value) return "";
  const d = new Date(value);
  if(isNaN(d)) return value;
  return d.getFullYear() + "/" + (d.getMonth() + 1) + "/" + d.getDate();
}

function openPopupAbove(layer){
  const bounds = layer.getBounds();
  const topCenter = L.latLng(bounds.getNorth(), (bounds.getEast() + bounds.getWest()) / 2);
  layer.openPopup(topCenter);
}

function makePopupHtml(row, isPlanned){
  let html =
    `<div class="popup-main-info">` +
    "種類：" + row["種類"] + "<br>" +
    "実施日：" + formatDateSimple(row["実施日"]) + "<br>" +
    "枚数：" + row["枚数"] + "<br>" +
    "担当：" + row["担当者"] + "<br>" +
    "備考：" + row["備考"] +
    `</div>`;

  if(isPlanned){
    html += `<br><br><button onclick="convertPlannedToDone('${row["ID"]}')">配布済にする</button>`;
  }

    html += `<br><br><button class="popup-admin-btn" onclick="openRequestMenu('${row["ID"]}')">管理者へ修正依頼</button>`;

    html += `
      <hr class="popup-sub-divider">
      <div class="popup-admin-box">
        <span class="popup-admin-label">管理者用ID</span>
        <span class="popup-admin-id">${row["ID"]}</span>
        <button class="popup-admin-btn" onclick="copyAreaId('${row["ID"]}')">
          IDをコピー
        </button>
      </div>
    `;

  return html;
}

function copyAreaId(id){
  navigator.clipboard.writeText(id)
    .then(() => alert("IDをコピーしました"))
    .catch(() => prompt("このIDをコピーしてください", id));
}
window.copyAreaId = copyAreaId;

function renderAdminHistory(areas){
  const histories = areas.filter(row => row["管理者修正履歴"]);
  const box = document.getElementById("adminHistoryContent");

  if(histories.length === 0){
    box.innerHTML = "履歴なし";
    return;
  }

  box.innerHTML = histories.reverse().map(row => `
    <div class="history-item">
      修正依頼日：${formatDateSimple(row["修正依頼日時"]) || ""}<br>
      管理者修正日時：${formatDateSimple(row["管理者修正日時"]) || ""}<br>
      内容：<br>
      ${String(row["管理者修正履歴"]).replace(/\n/g, "<br>")}
    </div>
  `).join("");
}

fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(json => {
    document.getElementById("titleBox").textContent = json.title;
    renderAdminHistory(json.areas);

    const planned = [];
    const done = [];

    json.areas.forEach(row => {
      if(!row["図形データ"]) return;
      const geo = JSON.parse(row["図形データ"]);
      if(row["種類"] === "配布予定") planned.push({geo, row});
      if(row["種類"] === "配布済") done.push({geo, row});
    });

    function drawLayer(item){
      const layer = L.geoJSON(item.geo, {
        style:{
          color:getColor(item.row["種類"]),
          fillColor:getColor(item.row["種類"]),
          fillOpacity:item.row["種類"] === "配布済" ? 0.5 : 0.35
        }
      }).addTo(drawnItems);

      const isPlanned = item.row["種類"] === "配布予定";

      areaItemsById[item.row["ID"]] = item;
      areaLayersById[item.row["ID"]] = layer;

      if(isPlanned){
        plannedItemsById[item.row["ID"]] = item;
      }

      layer.bindPopup(makePopupHtml(item.row, isPlanned));

      layer.on("click", function() {
        map.fitBounds(layer.getBounds(), {
          padding: [40, 40],
          maxZoom: getTapZoom()
        });
      });
    }

    async function convertPlannedToDone(id){
      const item = plannedItemsById[id];
      if(!item){
        alert("配布予定データが見つかりません");
        return;
      }

      const formData = await openDoneForm(item.row);
      if(!formData) return;

      fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify({
          pass:formData.pass,
          id:id + "（2）",
          baseId:id,
          type:"配布済",
          date:formData.date,
          count:formData.count,
          person:formData.person,
          note:formData.note,
          geometry:item.geo
        })
      })
      .then(res => res.json())
      .then(result => {
        if(result.status === "OK"){
          const doneLayer = L.geoJSON(item.geo,{
            style:{
              color:getColor("配布済"),
              fillColor:getColor("配布済"),
              fillOpacity:0.5
            }
          }).addTo(drawnItems);

          const doneRow = {
            "ID": id + "（2）",
            "種類": "配布済",
            "実施日": formData.date,
            "枚数": formData.count,
            "担当者": formData.person,
            "備考": formData.note
          };

          doneLayer.bindPopup(makePopupHtml(doneRow, false));
          openPopupAbove(doneLayer);
        }else{
          alert("合言葉が違います");
        }
      });
    }

    function openRequestMenu(id){
      currentRequestId = id;
      document.getElementById("requestChoiceModal").style.display = "flex";
    }

    function chooseDeleteRequest(){
      document.getElementById("requestChoiceModal").style.display = "none";
      const pass = prompt("合言葉");
      if(!pass) return;
      const ok = confirm("削除依頼を送信してよろしいですか？");
      if(!ok) return;
      sendRequestToSheet(currentRequestId, pass, "【削除依頼】このエリアの削除をお願いします。");
    }

    function chooseModifyRequest(){
      document.getElementById("requestChoiceModal").style.display = "none";
      openModifyRequestForm(currentRequestId);
    }

    function cancelRequestChoice(){
      document.getElementById("requestChoiceModal").style.display = "none";
      currentRequestId = null;
    }

    function sendDeleteRequest(id){
      const pass = prompt("合言葉");
      if(!pass) return;
      const ok = confirm("削除依頼を送信してよろしいですか？");
      if(!ok) return;
      sendRequestToSheet(id, pass, "【削除依頼】このエリアの削除をお願いします。");
    }

    function openModifyRequestForm(id){
      currentRequestId = id;
      document.getElementById("requestType").value = "";
      document.getElementById("requestYear").value = "";
      document.getElementById("requestMonth").value = "";
      document.getElementById("requestDay").value = "";
      document.getElementById("requestCount").value = "";
      document.getElementById("requestPerson").value = "";
      document.getElementById("requestNote").value = "";
      document.getElementById("requestPass").value = "";
      document.getElementById("requestError").textContent = "";
      document.getElementById("requestFormModal").style.display = "flex";
    }

    function submitModifyRequest(){
      const pass = document.getElementById("requestPass").value;
      const errorBox = document.getElementById("requestError");
      errorBox.textContent = "";

      if(!pass){
        errorBox.textContent = "※合言葉を入力してください";
        return;
      }

      const requestYear = document.getElementById("requestYear").value;
      const requestMonth = document.getElementById("requestMonth").value;
      const requestDay = document.getElementById("requestDay").value;

      const requestDate = requestYear && requestMonth && requestDay ? `${requestYear}/${requestMonth}/${requestDay}` : "";

      const requestText =
        "【修正依頼】\n" +
        "種類：" + document.getElementById("requestType").value + "\n" +
        "日付：" + requestDate + "\n" +
        "枚数：" + document.getElementById("requestCount").value + "\n" +
        "担当者：" + document.getElementById("requestPerson").value + "\n" +
        "備考：" + document.getElementById("requestNote").value;

      const ok = confirm("修正依頼を送信しますか？");
      if(!ok) return;

      document.getElementById("requestFormModal").style.display = "none";
      sendRequestToSheet(currentRequestId, pass, requestText);
    }

    function cancelRequestForm(){
      document.getElementById("requestFormModal").style.display = "none";
    }

    function sendRequestToSheet(id, pass, requestText){
      fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify({
          action:"request",
          id:id,
          pass:pass,
          requestText:requestText
        })
      })
      .then(res => res.json())
      .then(result => {
        if(result.status === "OK"){
          alert("管理者への依頼を送信しました");
        }else if(result.status === "NG"){
          alert("合言葉が違います");
        }else{
          alert("対象データが見つかりませんでした");
        }
      });
    }

    window.chooseDeleteRequest = chooseDeleteRequest;
    window.chooseModifyRequest = chooseModifyRequest;
    window.cancelRequestChoice = cancelRequestChoice;
    window.submitModifyRequest = submitModifyRequest;
    window.cancelRequestForm = cancelRequestForm;
    window.openRequestMenu = openRequestMenu;
    window.convertPlannedToDone = convertPlannedToDone;

    planned.forEach(drawLayer);
    done.forEach(drawLayer);
  });

map.on("draw:created", async function(e){
  const layer = e.layer;
  const geo = layer.toGeoJSON();

  const formData = await openAreaForm();
  if(!formData) return;

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      pass:formData.pass,
      type:formData.type,
      date:formData.date,
      count:formData.count,
      person:formData.person,
      note:formData.note,
      geometry:geo
    })
  })
  .then(res => res.json())
  .then(result => {
    if(result.status === "OK"){
      layer.setStyle({
        color:getColor(formData.type),
        fillColor:getColor(formData.type),
        fillOpacity:formData.type === "配布済" ? 0.5 : 0.35
      });

      drawnItems.addLayer(layer);

      const newRow = {
        "ID": result.id,
        "種類": formData.type,
        "実施日": formData.date,
        "枚数": formData.count,
        "担当者": formData.person,
        "備考": formData.note
      };

      const isPlanned = formData.type === "配布予定";

      if(isPlanned){
        plannedItemsById[newRow["ID"]] = { geo:geo, row:newRow };
      }

      areaItemsById[newRow["ID"]] = { geo:geo, row:newRow };
      areaLayersById[newRow["ID"]] = layer;

      layer.bindPopup(makePopupHtml(newRow, isPlanned));
      layer.on("click", function() {
        map.fitBounds(layer.getBounds(), {
          padding: [40, 40],
          maxZoom: getTapZoom()
        });
      });

      openPopupAbove(layer);
    }else{
      alert("合言葉が違います");
    }
  });
});

let mobileDrawing = false;
let mobilePoints = [];
let mobilePreviewLayer = null;

function isMobile(){
  return window.matchMedia("(max-width:600px) and (pointer:coarse)").matches;
}

function startMobileDraw(){
  if(!isMobile()) return;
  mobileDrawing = true;
  mobilePoints = [];

  if(mobilePreviewLayer){
    map.removeLayer(mobilePreviewLayer);
    mobilePreviewLayer = null;
  }

  alert("地図の中心に合わせて「ここに点を追加」を押してください。3点以上で囲めます。");

  document.getElementById("mobileDrawStart").style.display = "none";
  document.getElementById("mobileDrawPanel").style.display = "flex";
  document.getElementById("mapCenterCross").style.display = "block";
}

function addMobilePoint(){
  if(!isMobile()) return;
  if(!mobileDrawing){
    alert("先に「作図開始」を押してください");
    return;
  }
  const center = map.getCenter();
  mobilePoints.push([center.lat, center.lng]);
  updateMobilePreview();
}

function undoMobilePoint(){
  if(!isMobile()) return;
  if(mobilePoints.length === 0) return;
  mobilePoints.pop();
  updateMobilePreview();
}

function updateMobilePreview(){
  if(mobilePreviewLayer){
    map.removeLayer(mobilePreviewLayer);
    mobilePreviewLayer = null;
  }

  if(mobilePoints.length === 1){
    mobilePreviewLayer = L.circleMarker(mobilePoints[0], {
      radius:5,
      color:"#ff6600",
      fillColor:"#ff6600",
      fillOpacity:0.8
    }).addTo(map);
    return;
  }

  if(mobilePoints.length >= 2){
    mobilePreviewLayer = L.polyline(mobilePoints, {
      color:"#ff6600",
      weight:3
    }).addTo(map);
  }
}

async function finishMobileDraw(){
  if(!isMobile()) return;
  if(!mobileDrawing){
    alert("先に「作図開始」を押してください");
    return;
  }
  if(mobilePoints.length < 3){
    alert("範囲を作るには3点以上必要です");
    return;
  }

  const geo = {
    type:"Feature",
    properties:{},
    geometry:{
      type:"Polygon",
      coordinates:[mobilePoints.map(p => [p[1], p[0]])]
    }
  };

  const layer = L.geoJSON(geo).getLayers()[0];
  const formData = await openAreaForm();
  if(!formData) return;

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      pass:formData.pass,
      type:formData.type,
      date:formData.date,
      count:formData.count,
      person:formData.person,
      note:formData.note,
      geometry:geo
    })
  })
  .then(res => res.json())
  .then(result => {
    if(result.status === "OK"){
      layer.setStyle({
        color:getColor(formData.type),
        fillColor:getColor(formData.type),
        fillOpacity:formData.type === "配布済" ? 0.5 : 0.35
      });

      drawnItems.addLayer(layer);

      const newRow = {
        "ID": result.id,
        "種類": formData.type,
        "実施日": formData.date,
        "枚数": formData.count,
        "担当者": formData.person,
        "備考": formData.note
      };

      const isPlanned = formData.type === "配布予定";

      if(isPlanned){
        plannedItemsById[newRow["ID"]] = { geo:geo, row:newRow };
      }

      areaItemsById[newRow["ID"]] = { geo:geo, row:newRow };
      areaLayersById[newRow["ID"]] = layer;

      layer.bindPopup(makePopupHtml(newRow, isPlanned));
      layer.on("click", function() {
        map.fitBounds(layer.getBounds(), {
          padding: [40, 40],
          maxZoom: 11
        });
      });

      if(mobilePreviewLayer){
        map.removeLayer(mobilePreviewLayer);
        mobilePreviewLayer = null;
      }

      mobileDrawing = false;
      mobilePoints = [];

      document.getElementById("mobileDrawPanel").style.display = "none";
      document.getElementById("mobileDrawStart").style.display = "block";
      document.getElementById("mapCenterCross").style.display = "none";

      openPopupAbove(layer);
    }else{
      alert("合言葉が違います");
    }
  });
}

function cancelMobileDraw(){
  if(!isMobile()) return;

  mobileDrawing = false;
  mobilePoints = [];

  if(mobilePreviewLayer){
    map.removeLayer(mobilePreviewLayer);
    mobilePreviewLayer = null;
  }

  document.getElementById("mobileDrawPanel").style.display = "none";
  document.getElementById("mobileDrawStart").style.display = "block";
  document.getElementById("mapCenterCross").style.display = "none";
}

window.startMobileDraw = startMobileDraw;
window.addMobilePoint = addMobilePoint;
window.undoMobilePoint = undoMobilePoint;
window.finishMobileDraw = finishMobileDraw;
window.cancelMobileDraw = cancelMobileDraw;

function resetView(){
  if(window.fullBounds){
    map.fitBounds(window.fullBounds);
  }
}

function searchAreaById(){
  const keyword = document.getElementById("idSearchInput").value.trim();
  const countBox = document.getElementById("idSearchResultCount");

  if(!keyword){
    alert("IDを入力してください");
    countBox.textContent = "";
    return;
  }

  const matchedIds = Object.keys(areaLayersById).filter(id => id.includes(keyword));
  countBox.textContent = matchedIds.length + "件見つかりました";

  if(matchedIds.length === 0){
    alert("該当するIDのエリアが見つかりませんでした");
    return;
  }

  const layer = areaLayersById[matchedIds[0]];
  map.fitBounds(layer.getBounds(), {
    padding: [40, 40],
    maxZoom: getTapZoom()
  });
  openPopupAbove(layer);
}
window.searchAreaById = searchAreaById;

let areaFormResolver = null;
let doneFormResolver = null;

function setupDateSelects(){
  const month = document.getElementById("formMonth");
  const day = document.getElementById("formDay");
  const doneMonth = document.getElementById("doneMonth");
  const doneDay = document.getElementById("doneDay");
  const requestMonth = document.getElementById("requestMonth");
  const requestDay = document.getElementById("requestDay");

  for(let i=1; i<=12; i++){
    month.innerHTML += `<option value="${i}">${i}</option>`;
    doneMonth.innerHTML += `<option value="${i}">${i}</option>`;
    requestMonth.innerHTML += `<option value="${i}">${i}</option>`;
  }

  for(let i=1; i<=31; i++){
    day.innerHTML += `<option value="${i}">${i}</option>`;
    doneDay.innerHTML += `<option value="${i}">${i}</option>`;
    requestDay.innerHTML += `<option value="${i}">${i}</option>`;
  }
}
setupDateSelects();

function openAreaForm(){
  document.getElementById("formType").value = "";
  document.getElementById("formYear").value = "";
  document.getElementById("formMonth").value = "";
  document.getElementById("formDay").value = "";
  document.getElementById("formCount").value = "";
  document.getElementById("formPerson").value = "";
  document.getElementById("formNote").value = "";
  document.getElementById("formPass").value = "";
  document.getElementById("typeError").textContent = "";

function splitDateValue(value){
  if(!value) return {year:"", month:"", day:""};
  const d = new Date(value);
  if(!isNaN(d)){
    return {
      year:String(d.getFullYear()),
      month:String(d.getMonth()+1),
      day:String(d.getDate())
    };
  }
  const parts = String(value).split("/");
  return {
    year:parts[0] || "",
    month:parts[1] || "",
    day:parts[2] || ""
  };
}

function openDoneForm(row){
  const dateParts = splitDateValue(row["実施日"]);
  document.getElementById("doneYear").value = dateParts.year;
  document.getElementById("doneMonth").value = dateParts.month;

  document.getElementById("doneCount").value = row["枚数"] || "";
  document.getElementById("donePerson").value = row["担当者"] || "";

function openContactForm(){
  document.getElementById("contactTitle").value = "";
  document.getElementById("contactMessage").value = "";
  document.getElementById("contactName").value = "";
  document.getElementById("contactEmail").value = "";
  document.getElementById("contactNote").value = "";
  document.getElementById("contactPass").value = "";
  document.getElementById("contactError").textContent = "";
  document.getElementById("contactFormModal").style.display = "flex";
}

function submitContactForm(){
  const errorBox = document.getElementById("contactError");
  errorBox.textContent = "";

  const title = document.getElementById("contactTitle").value;
  const message = document.getElementById("contactMessage").value;
  const pass = document.getElementById("contactPass").value;

  if(!title){
    errorBox.textContent = "※タイトルを入力してください";
    return;
  }
  if(!message){
    errorBox.textContent = "※内容を入力してください";
    return;
  }
  if(!pass){
    errorBox.textContent = "※合言葉を入力してください";
    return;
  }

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"contact",
      pass:pass,
      title:title,
      message:message,
      name:document.getElementById("contactName").value,
      email:document.getElementById("contactEmail").value,
      note:document.getElementById("contactNote").value
    })
  })
  .then(res => res.json())
  .then(result => {
    if(result.status === "OK"){
      alert("管理者へ連絡を送信しました");
      document.getElementById("contactFormModal").style.display = "none";
    }else{
      alert("合言葉が違います");
    }
  });
}

function cancelContactForm(){
  document.getElementById("contactFormModal").style.display = "none";
}

function getTapZoom(){
  return window.matchMedia("(max-width:600px)").matches ? 13 : 11;
}

function getCityFitOptions(){
  if(window.matchMedia("(max-width:600px)").matches){
    return { padding:[30,30] };
  }
  return {
    paddingTopLeft:[20,20],
    paddingBottomRight:[320,20]
  };
}

document.getElementById("adminHistoryBox").addEventListener("click", function(){
  if(window.matchMedia("(max-width:600px)").matches){
    this.classList.toggle("expanded");
  }
});

let ignoreNextClick = false;

map.getContainer().addEventListener("touchstart", function(e){
  if(e.touches.length >= 2){
    ignoreNextClick = true;
  }
}, {passive:true});

map.getContainer().addEventListener("touchend", function(){
  setTimeout(function(){
    ignoreNextClick = false;
  }, 300);
}, {passive:true});

map.on("click", function(e){
  if(ignoreNextClick){
    e.originalEvent.stopPropagation();
    return;
  }
});
