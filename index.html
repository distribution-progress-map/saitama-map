<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@900&display=swap" rel="stylesheet">
<title>埼玉進捗マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

.title-panel {
  top: 26px;
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(22px, 4vw, 48px);
  font-weight: 900;
  text-align: center;
  max-width: 90%;

  font-family: "Zen Kaku Gothic New", sans-serif;

  letter-spacing: 0.08em;

  background: rgba(255,255,255,0.92);
  padding: 8px 18px;
  border-radius: 10px;

  box-shadow: 0 3px 8px rgba(0,0,0,0.18);
}

html, body {
  margin: 0;
  height: 100%;
  font-family: sans-serif;
}

#map {
  height: 100%;
}

.panel {
  position: absolute;
  background: white;
  z-index: 1000;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
  box-shadow: 0 0 8px rgba(0,0,0,0.25);
}

.search-panel {
  top: 20px;
  left: 20px;
  width: 260px;
}

.search-panel input {
  width: 170px;
  padding: 6px;
}

.search-panel button {
  padding: 6px 10px;
}

.summary {
  top: 20px;
  right: 20px;
  width: 250px;
}

.legend {
  bottom: 20px;
  right: 20px;
  line-height: 1.7;
}

.color-box {
  display: inline-block;
  width: 14px;
  height: 14px;
  margin-right: 6px;
  border: 1px solid #333;
}

.rank-item {
  margin-top: 6px;
}
</style>
</head>

<body>
<div id="map"></div>

<div class="panel title-panel" id="mapTitle">
  読み込み中...
</div>

<div class="panel search-panel">
  <strong>市町村検索</strong><br><br>
  <input id="searchInput" type="text" placeholder="例：川越市">
  <button onclick="searchCity()">検索</button>
</div>

<div class="panel summary" id="summary">
  読み込み中...
</div>

<div class="panel legend">
  <strong>進捗状態</strong><br>
  <span class="color-box" style="background:#d9d9d9"></span>未着手（0%）<br>
  <span class="color-box" style="background:#ffd600"></span>0–50%<br>
  <span class="color-box" style="background:#0070ff"></span>51–80%<br>
  <span class="color-box" style="background:#00b050"></span>81–100%<br>
</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbw5Ik32lhEQcAQ4j-FDEcD_xHJwJNPUvsFMqreNTY5uJuyg737OCXv5UwjMu8t22RWxNg/exec";

const map = L.map('map').setView([35.9,139.5],9);

L.tileLayer(
  'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution:'© OpenStreetMap contributors' }
).addTo(map);

let cityLayers = {};

function getColor(percent) {

  if (percent === 0) return "#d9d9d9"; // 未着手（薄グレー）

  if (percent <= 50) return "#ffd600"; // 0-50%（濃い黄色）

  if (percent <= 80) return "#0070ff"; // 51-80%（濃い青）

  return "#00b050"; // 81-100%（濃い緑）

}

function getStatus(percent, hasData) {
  if (!hasData) return "未入力";
  if (percent === 0) return "未着手";
  if (percent >= 100) return "完了";
  return "進行中";
}

function getCityName(feature) {
  return feature.properties.N03_004 || feature.properties.name || feature.properties.NAME || "";
}

function numberValue(value) {
  if (value === "" || value === null || value === undefined) return 0;
  return Number(String(value).replace(/,/g, "")) || 0;
}

function formatNumber(value) {
  return Number(value || 0).toLocaleString();
}

function formatDate(value) {
  if (!value) return "";
  const date = new Date(value);
  if (!isNaN(date)) {
    return `${date.getMonth() + 1}/${date.getDate()}`;
  }
  return value;
}

function searchCity() {
  const keyword = document.getElementById("searchInput").value.trim();

  if (!keyword) {
    alert("市町村名を入力してください");
    return;
  }

  const matchedName = Object.keys(cityLayers).find(name =>
    name.includes(keyword)
  );

  if (!matchedName) {
    alert("該当する市町村が見つかりませんでした");
    return;
  }

  const layer = cityLayers[matchedName];

  map.fitBounds(layer.getBounds(), {
    padding: [40, 40]
  });

  layer.openPopup();
}

function jumpToCity(cityName) {
  const layer = cityLayers[cityName];

  if (!layer) {
    alert("市町村データが見つかりません");
    return;
  }

  map.fitBounds(layer.getBounds(), {
    padding: [40, 40]
  });

  layer.openPopup();
}

function getProgressBar(percent) {

  const color = getColor(percent);

  return `
    <div style="
      width: 160px;
      height: 12px;
      background: #eeeeee;
      border: 1px solid #999;
      border-radius: 8px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    ">
      <div style="
        width: ${Math.min(percent, 100)}%;
        height: 100%;
        background: ${color};
      "></div>
    </div>
    ${percent.toFixed(1)}%
  `;
}


// ===== 更新遅延チェック機能ここから =====
function getUpdateWarning(latestDate) {

  if (!latestDate) return "";

  const last = new Date(latestDate);
  const today = new Date();

  const diffDays = Math.floor(
    (today - last) / (1000 * 60 * 60 * 24)
  );

  if (diffDays >= 7) {
    return "⚠ 最終更新から7日以上経過";
  }

  return "";

}
// ===== 更新遅延チェック機能ここまで =====




document.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    const active = document.activeElement;
    if (active && active.id === "searchInput") {
      searchCity();
    }
  }
});

Promise.all([
  fetch('saitama.geojson').then(res => res.json()),
  fetch(SHEET_URL).then(res => res.json())
])
.then(([geojson, sheetResponse]) => {

    const mapTitle = sheetResponse.title || "埼玉進捗マップ";
    const sheetData = sheetResponse.data || [];

document.getElementById("mapTitle").textContent = mapTitle;


  const dataByCity = {};

  sheetData.forEach(row => {
    const city = row["市町村名"];
    if (!city) return;

    if (!dataByCity[city]) {
      dataByCity[city] = {
        cityName: city,
        totalHouseholds: 0,
        distributedTotal: 0,
        records: [],
        latestDate: ""
      };
    }

    const households = numberValue(row["全戸数"]);
    const distributed = numberValue(row["配布個数"]);

    if (households > 0) {
      dataByCity[city].totalHouseholds = households;
    }

    dataByCity[city].distributedTotal += distributed;

    if (distributed > 0 || row["実施日"] || row["実施者"] || row["備考"]) {
      dataByCity[city].records.push({
        date: row["実施日"] || "",
        person: row["実施者"] || "",
        count: distributed,
        note: row["備考"] || ""
      });
    }
  });

  Object.values(dataByCity).forEach(city => {
    city.percent = city.totalHouseholds > 0
      ? city.distributedTotal / city.totalHouseholds * 100
      : 0;

    city.status = getStatus(city.percent, true);

    city.records.sort((a, b) => new Date(a.date) - new Date(b.date));

    const dates = city.records
      .map(r => new Date(r.date))
      .filter(d => !isNaN(d));

    if (dates.length > 0) {
      const latest = new Date(Math.max(...dates));
      city.latestDate = `${latest.getFullYear()}/${latest.getMonth() + 1}/${latest.getDate()}`;
    }
  });

  const layer = L.geoJSON(geojson, {
    style: function(feature) {
      const cityName = getCityName(feature);
      const cityData = dataByCity[cityName];
      const hasData = !!cityData;
      const percent = hasData ? cityData.percent : 0;

      return {
        color: "black",
        weight: 1,
        fillColor: getColor(percent),
        fillOpacity: 0.78
      };
    },

    onEachFeature: function(feature, layer) {
      const cityName = getCityName(feature);
      const cityData = dataByCity[cityName];

      cityLayers[cityName] = layer;

      if (!cityData) {
        layer.bindPopup(`
          <strong>${cityName}</strong><br><br>
          ステータス：未入力
        `);
        return;
      }

      let historyHtml = "";

      if (cityData.records.length > 0) {
        historyHtml = cityData.records.map(record => {
          const date = formatDate(record.date);
          const person = record.person || "";
          const count = record.count ? `${formatNumber(record.count)}件` : "";
          const note = record.note || "";
          return `${date}　${person}　${count}　${note}`;
        }).join("<br>");
      } else {
        historyHtml = "履歴なし";
      }

      layer.bindPopup(`
        <strong>${cityName}</strong><br><br>
        ステータス：${cityData.status}<br>
        達成率：${cityData.percent.toFixed(1)}%<br>
        <br>
        進捗：${getProgressBar(cityData.percent)}<br>
        全戸数：${formatNumber(cityData.totalHouseholds)}件<br>
        配布合計：${formatNumber(cityData.distributedTotal)}件<br>
        最終実施日：${cityData.latestDate || "未登録"}<br>



// ===== 更新遅延チェック機能ここから =====
${getUpdateWarning(cityData.latestDate)}<br>
// ===== 更新遅延チェック機能ここまで =====



<br>
        <strong>実施履歴：</strong><br>
        ${historyHtml}
      `);
    }
  }).addTo(map);

  map.fitBounds(layer.getBounds());

  const allCityNames = Object.keys(cityLayers);

const missingCities = allCityNames.filter(name => {
  const cityData = dataByCity[name];
  return !cityData || cityData.distributedTotal === 0;
});

  const cityList = Object.values(dataByCity);

  const notStartedCount = cityList.filter(c => c.percent === 0).length;
const inProgressCount = cityList.filter(c => c.percent > 0 && c.percent < 100).length;
const completedCount = cityList.filter(c => c.percent >= 100).length;

  const totalDistributed = cityList.reduce((sum, c) => sum + c.distributedTotal, 0);
  const totalHouseholds = cityList.reduce((sum, c) => sum + c.totalHouseholds, 0);
  const overallPercent = totalHouseholds > 0 ? totalDistributed / totalHouseholds * 100 : 0;

  const latestDates = cityList
    .flatMap(c => c.records.map(r => new Date(r.date)))
    .filter(d => !isNaN(d));

  let latestText = "未登録";
  if (latestDates.length > 0) {
    const latest = new Date(Math.max(...latestDates));
    latestText = `${latest.getFullYear()}/${latest.getMonth() + 1}/${latest.getDate()}`;
  }

  const top5 = cityList
    .filter(c => c.totalHouseholds > 0)
    .sort((a, b) => b.percent - a.percent)
    .slice(0, 5);

  document.getElementById("summary").innerHTML = `
    <strong>埼玉進捗マップ</strong><br><br>
    全体達成率：${overallPercent.toFixed(1)}%<br>
    配布合計：${formatNumber(totalDistributed)}戸<br>
    対象戸数：${formatNumber(totalHouseholds)}戸<br>
    最終更新：${latestText}<br><br>

<strong>進捗状況</strong><br>
未着手：${notStartedCount}<br>
進行中：${inProgressCount}<br>
完了：${completedCount}<br><br>

    <br>
<strong>未着手市町村</strong><br>
${missingCities.length}件<br>
${missingCities.slice(0, 10).map(name => `
  <span
    style="cursor:pointer;color:#0070ff;text-decoration:underline"
    onclick="jumpToCity('${name}')"
  >
    ${name}
  </span>
`).join("、")}
${missingCities.length > 10 ? " ほか" : ""}
<br><br>

    <strong>進捗トップ5</strong>
    ${top5.map((c, i) => `
      <div class="rank-item">
        ${i + 1}. ${c.cityName}：${c.percent.toFixed(1)}%
      </div>
    `).join("")}
  `;
})
.catch(error => {
  console.error(error);
  alert("データの読み込みに失敗しました。Apps ScriptのURLやファイル名を確認してください。");
});
</script>

</body>
</html>
