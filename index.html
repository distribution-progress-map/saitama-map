<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@900&display=swap" rel="stylesheet">

<title>埼玉進捗マップ</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

html, body {
margin:0;
height:100%;
font-family:sans-serif;
}

#map{
height:100%;
}

.panel{
position:absolute;
background:white;
z-index:1000;
padding:12px;
border-radius:8px;
font-size:14px;
box-shadow:0 0 8px rgba(0,0,0,0.25);
}

.title-panel{
top:26px;
left:50%;
transform:translateX(-50%);
font-size:clamp(12px,2vw,24px);
font-weight:900;
text-align:center;
max-width:90%;
font-family:"Zen Kaku Gothic New",sans-serif;
letter-spacing:0.08em;
background:rgba(255,255,255,0.92);
padding:8px 18px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.18);
}

.search-panel{
top:20px;
left:20px;
width:260px;
}

.summary{
top:20px;
right:20px;
width:250px;
}

.legend{
bottom:20px;
right:20px;
line-height:1.7;
}

.color-box{
display:inline-block;
width:14px;
height:14px;
margin-right:6px;
border:1px solid #333;
}

.rank-item{
margin-top:6px;
}


/* ===== スマホ表示最適化 ===== */

@media(max-width:600px){

.title-panel{
top:12px;
font-size:clamp(14px,3vw,18px);
max-width:86%;
}

.search-panel{
top:85px;
left:10px;
width:42%;
font-size:12px;
padding:8px;
}

.search-panel input{
width:100%;
margin-bottom:6px;
}

.search-panel button{
width:100%;
}

#summary{
top:85px;
right:10px;
width:42%;
max-height:26vh;
overflow-y:auto;
font-size:12px;
padding:8px;
position:absolute;
}

#summary::after{
content:"▼ 下にスクロール";
position:sticky;
bottom:0;
display:block;
background:linear-gradient(to top,white 70%,rgba(255,255,255,0));
padding-top:18px;
text-align:center;
font-size:11px;
color:#555;
}

.legend{
right:10px;
bottom:38px;
font-size:12px;
padding:8px;
}

.color-box{
width:11px;
height:11px;
}

.leaflet-popup-content{
font-size:14px;
}

body.popup-open .panel{
display:none;
}

body.popup-open .leaflet-popup{
display:block;
}

}

</style>
</head>

<body>

<div id="map"></div>

<div class="panel title-panel" id="mapTitle">
読み込み中...
</div>

<div class="panel search-panel">

<strong>市町村検索</strong><br><br>

<input id="searchInput"
type="text"
placeholder="例：川越市">

<button onclick="searchCity()">検索</button>

</div>


<div class="panel summary" id="summary">
読み込み中...
</div>


<div class="panel legend">

<strong>進捗状態</strong><br>

<span class="color-box"
style="background:#d9d9d9"></span>
未着手（0%）<br>

<span class="color-box"
style="background:#ff3333"></span>
0–50%<br>

<span class="color-box"
style="background:#ffd600"></span>
51–80%<br>

<span class="color-box"
style="background:#0070ff"></span>
81–100%<br>

</div>


<script>

const SHEET_URL=
"https://script.google.com/macros/s/AKfycbw5Ik32lhEQcAQ4j-FDEcD_xHJwJNPUvsFMqreNTY5uJuyg737OCXv5UwjMu8t22RWxNg/exec";


const map=
L.map("map")
.setView([35.9,139.5],9);


L.tileLayer(
"https://tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap contributors"}
).addTo(map);


let cityLayers={};


function getColor(percent){

if(percent===0)return"#d9d9d9";

if(percent<=50)return"#ff3333";

if(percent<=80)return"#ffd600";

return"#0070ff";

}


function getCityName(feature){

return feature.properties.N03_004
||feature.properties.name
||feature.properties.NAME
||"";

}


function searchCity(){

const keyword=
document.getElementById("searchInput")
.value.trim();

if(!keyword){

alert("市町村名を入力してください");
return;

}

const matchedName=
Object.keys(cityLayers)
.find(name=>name.includes(keyword));

if(!matchedName){

alert("該当する市町村が見つかりませんでした");
return;

}

const layer=
cityLayers[matchedName];

map.fitBounds(layer.getBounds());

layer.openPopup();

}


Promise.all([

fetch("saitama.geojson")
.then(res=>res.json()),

fetch(SHEET_URL)
.then(res=>res.json())

])

.then(([geojson,sheetResponse])=>{


document.getElementById("mapTitle")
.textContent=
sheetResponse.title||"埼玉進捗マップ";


const sheetData=
sheetResponse.data||[];


const dataByCity={};


sheetData.forEach(row=>{

const city=row["市町村名"];

if(!city)return;

if(!dataByCity[city]){

dataByCity[city]={

totalHouseholds:0,
distributedTotal:0

};

}

dataByCity[city].totalHouseholds=
Number(row["全戸数"]||0);

dataByCity[city].distributedTotal+=
Number(row["配布個数"]||0);

});


const layer=

L.geoJSON(geojson,{

style:function(feature){

const name=
getCityName(feature);

const data=
dataByCity[name];

const percent=
data?
data.distributedTotal/
data.totalHouseholds*100
:0;

return{

color:"black",
weight:1,
fillColor:getColor(percent),
fillOpacity:0.78

};

},


onEachFeature:function(feature,layer){

const cityName=
getCityName(feature);

cityLayers[cityName]=layer;


/* ===== 市クリックで町丁目ページへ遷移 ===== */

layer.on("dblclick",function(){

const cityFileMap={

"川越市":"kawagoe.html"

};

if(cityFileMap[cityName]){

window.location.href=
cityFileMap[cityName];

}

});

/* ===== 遷移ここまで ===== */


layer.bindPopup(cityName);

}

})

.addTo(map);


map.fitBounds(layer.getBounds());

});


</script>

</body>
</html>
